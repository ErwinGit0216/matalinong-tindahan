name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run unit tests
        run: npm run test

      - name: Build
        env:
          # Dummy values so `next build` can complete in CI without real secrets.
          # Real values are set in Vercel's project environment variables for the
          # actual deployment — this build step only checks the app compiles.
          ANTHROPIC_API_KEY: "ci-placeholder"
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "ci-placeholder"
          SUPABASE_SERVICE_ROLE_KEY: "ci-placeholder"
        run: npm run build
